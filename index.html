<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0f0f0f;
font-family:Arial;
color:#fff;
}

/* HEADER */
.header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #222;
font-weight:bold;
color:#e50914;
}

/* LAYOUT */
.layout{
display:grid;
grid-template-columns:1fr 350px;
gap:20px;
padding:20px;
max-width:1300px;
margin:auto;
}

/* VIDEO */
.player video{
width:100%;
border-radius:12px;
background:#000;
}

/* INFO */
.title{
margin-top:10px;
font-size:18px;
}

.actions{
margin-top:10px;
display:flex;
gap:10px;
}

.btn{
background:#1f1f1f;
border:none;
padding:8px 14px;
border-radius:20px;
color:#fff;
cursor:pointer;
}

.btn:hover{
background:#e50914;
}

/* SIDEBAR */
.sidebar{
display:flex;
flex-direction:column;
gap:10px;
}

.item{
display:flex;
gap:10px;
cursor:pointer;
padding:8px;
border-radius:10px;
}

.item:hover{
background:#1a1a1a;
}

.thumb{
width:120px;
height:70px;
background:#333;
border-radius:8px;
}

/* MOBILE */
@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="header">MyTube</div>

<div class="layout">

<!-- LEFT -->
<div>

<div class="player">
<video id="video" controls autoplay></video>
</div>

<div class="title" id="title">Memuat...</div>

<div class="actions">
<button class="btn" onclick="share()">Share</button>
</div>

</div>

<!-- RIGHT -->
<div class="sidebar" id="list"></div>

</div>

<script>
// ambil id dari URL
const params = new URLSearchParams(location.search);
let id = params.get("id");

// default
if(!id) id = "I0qRfHhX1";

// validasi
function valid(i){
return /^[a-zA-Z0-9_-]+$/.test(i);
}

const video = document.getElementById("video");
const title = document.getElementById("title");

// 🔥 GANTI POLA DI SINI (SESUIKAN CDN)
const videoUrl = "https://cdn2.videy.co/" + id + ".mp4";

// load video
if(valid(id)){
  video.src = videoUrl;
  title.innerText = "Video ID: " + id;

  video.onerror = () => {
    title.innerText = "Video gagal dimuat / tidak ditemukan";
  };

}else{
  title.innerText = "ID tidak valid";
}

// sidebar dummy
const list = document.getElementById("list");

const demo = ["I0qRfHhX1","abc123","test777","hello999","vid888"];

demo.forEach(v=>{
  if(v === id) return;

  const div = document.createElement("div");
  div.className = "item";
  div.onclick = () => location.search = "?id=" + v;

  div.innerHTML = `
    <div class="thumb"></div>
    <div>Video ${v}</div>
  `;

  list.appendChild(div);
});

// share
function share(){
navigator.clipboard.writeText(location.href);
alert("Link copied");
}
</script>

</body>
</html>
