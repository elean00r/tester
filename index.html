<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WATCH NOW 😱🔥</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#fff;
}

/* VIDEO */
.video-container{
position:relative;
width:100%;
height:65vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* PLAY BUTTON */
.play-overlay{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
background:linear-gradient(145deg,#ffffff30,#ffffff05);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
animation:pulse 1.5s infinite;
box-shadow:0 0 30px rgba(255,255,255,0.25);
}

.play-overlay:after{
content:'▶';
font-size:50px;
color:#fff;
margin-left:6px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

/* LOADING */
.loader{
position:absolute;
width:60px;
height:60px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* PROGRESS */
.progress{
position:absolute;
bottom:0;
left:0;
height:3px;
width:0%;
background:#ff0000;
}

/* TEXT */
.title{padding:14px;font-size:16px;font-weight:600;}
.stats{padding:0 14px 12px;font-size:14px;display:flex;gap:15px;opacity:0.85;}

/* RECOMMEND */
.recommend{padding:14px;}
.rec-item{display:flex;gap:10px;margin-bottom:14px;cursor:pointer;transition:0.25s;}
.rec-item:hover{transform:scale(1.05);}

/* THUMB PREMIUM */
.thumb{
width:120px;
height:70px;
border-radius:10px;
overflow:hidden;
position:relative;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
filter:blur(1px) contrast(1.3) brightness(1.1);
transform:scale(1.15);
transition:0.3s;
}

.rec-item:hover img{
filter:blur(0px) contrast(1.2);
transform:scale(1.1);
}

.rec-info{flex:1;font-size:13px;}
.rec-info b{display:block;margin-bottom:4px;}
.divider{height:1px;background:#222;margin:10px 0;}
</style>
</head>

<body>

<div class="video-container">
  <video id="videoPlayer" controls playsinline preload="metadata"></video>
  <div class="play-overlay" id="playBtn"></div>
  <div class="loader" id="loader"></div>
  <div class="progress" id="progressBar"></div>
</div>

<div class="title" id="videoTitle">This video is going viral… 😳</div>

<div class="stats">
<span id="views">👁️ 1,203,221</span>
<span id="likes">👍 34,221</span>
</div>

<div class="divider"></div>

<div class="recommend">
  <div id="recContainer"></div>
</div>

<script>
const video=document.getElementById("videoPlayer");
const playBtn=document.getElementById("playBtn");
const loader=document.getElementById("loader");
const progressBar=document.getElementById("progressBar");
const titleEl=document.getElementById("videoTitle");

/* 🔗 REDIRECT */
const redirectLink="https://dutchrelay.com/pmy9zqw6ug?key=ff6ee12c4ad4389fd54f705d80b8b55d";

/* VIDEO DATA */
const videoList=[
{src:"https://cdn2.videy.co/nFZL3N1s1.mp4",title:"Damn 😳",thumb:"https://cdn.aceimg.com/bf73fe1b6.jpg"},
{src:"https://cdn2.videy.co/PLYlJIPH1.mp4",title:"He said do it 😌",thumb:"https://cdn.aceimg.com/210031f34.jpg"},
{src:"https://cdn2.videy.co/YZsNNiG61.mp4",title:"Confused 😅",thumb:"https://cdn.aceimg.com/bb5a5ded3.jpg"},
{src:"https://cdn2.videy.co/Iogtb6Py1.mp4",title:"Not ready 😭",thumb:"https://cdn.aceimg.com/dcea08f4d.jpg"},
{src:"https://cdn2.videy.co/I8C28TvS1.mp4",title:"Crazy 😳",thumb:"https://cdn.aceimg.com/36f8b3634.jpg"},
{src:"https://cdn2.videy.co/xc2OvqQw1.mp4",title:"Real 🔥",thumb:"https://cdn.aceimg.com/96ddccf83.jpg"},
{src:"https://cdn2.videy.co/Jf55J6jk1.mp4",title:"Boutta cry 😳",thumb:"https://cdn.aceimg.com/bccdca29a.jpg"},
{src:"https://cdn2.videy.co/PO4M1BpN1.mp4",title:"Fresh 😭",thumb:"https://cdn.aceimg.com/70b5b402d.jpg"},
{src:"https://cdn2.videy.co/61siK1aE1.mp4",title:"Don’t skip 😳",thumb:"https://cdn.aceimg.com/33baadc62.jpg"},
{src:"https://cdn2.videy.co/tH2XBTQX1.mp4",title:"Own world 😮",thumb:"https://cdn.aceimg.com/70971b19e.jpg"}
];

/* RANDOM 5 */
function getRandom(current){
 return videoList.filter(v=>v.src!==current)
 .sort(()=>0.5-Math.random())
 .slice(0,5);
}

/* RENDER */
function render(current=""){
 const box=document.getElementById("recContainer");
 box.innerHTML="";
 getRandom(current).forEach(v=>{
  const d=document.createElement("div");
  d.className="rec-item";
  d.innerHTML=`
   <div class="thumb"><img src="${v.thumb}"></div>
   <div class="rec-info">
    <b>${v.title}</b>
    ${Math.floor(Math.random()*2+1)}M views
   </div>`;
  d.onclick=()=>loadVideo(v);
  box.appendChild(d);
 });
}

/* LOAD */
function loadVideo(v){
 video.src=v.src;
 titleEl.innerText=v.title;
 video.load();
 playBtn.style.display="flex";
 render(v.src);
}

/* PLAY FLOW */
playBtn.onclick=()=>{
 playBtn.style.display="none";
 loader.style.display="block";

 setTimeout(()=>{
  loader.style.display="none";
  video.play();

  setTimeout(()=>{
   window.open(redirectLink,"_blank");
  },400);

 },1200);
};

/* UI */
video.onpause=()=>playBtn.style.display="flex";
video.ontimeupdate=()=>progressBar.style.width=(video.currentTime/video.duration)*100+"%";

/* AUTO SHUFFLE */
setInterval(()=>render(video.src),8000);

/* COUNTER */
let views=1203221,likes=34221;
setInterval(()=>{
 views+=Math.floor(Math.random()*5);
 likes+=Math.floor(Math.random()*2);
 document.getElementById("views").innerText="👁️ "+views.toLocaleString();
 document.getElementById("likes").innerText="👍 "+likes.toLocaleString();
},2000);

/* INIT */
render("");
</script>
